# === Navigation ===
# Switch window focus
bind = super, tab, focuslast,
bind = super, h, focusdir, left
bind = super, j, focusdir, down
bind = super, k, focusdir, up
bind = super, l, focusdir,right

# Swap windows around
bind = super+shift, h, exchange_client, left
bind = super+shift, j, exchange_client, down
bind = super+shift, k, exchange_client, up
bind = super+shift, l, exchange_client, right

# Switch window mode (plus = fullscreen, minus = floating)
bind = super, equal, togglefullscreen,
bind = super, minus, togglefloating,

# Super + 1-9 switches to tag 1-9
bind = super, 1, view, 1, 0
bind = super, 2, view, 2, 0
bind = super, 3, view, 3, 0
bind = super, 4, view, 4, 0
bind = super, 5, view, 5, 0
bind = super, 6, view, 6, 0
bind = super, 7, view, 7, 0
bind = super, 8, view, 8, 0
bind = super, 9, view, 9, 0

# Super + Ctrl + 1-9 toggles that tag on/off
bind = super+ctrl, 1, toggletag, 1, 0
bind = super+ctrl, 2, toggletag, 2, 0
bind = super+ctrl, 3, toggletag, 3, 0
bind = super+ctrl, 4, toggletag, 4, 0
bind = super+ctrl, 5, toggletag, 5, 0
bind = super+ctrl, 6, toggletag, 6, 0
bind = super+ctrl, 7, toggletag, 7, 0
bind = super+ctrl, 8, toggletag, 8, 0
bind = super+ctrl, 9, toggletag, 9, 0

# Super + Shift + 1-9 switches to tag 1-9, and moves the current window along
bind = super+shift, 1, tag, 1, 0
bind = super+shift, 2, tag, 2, 0
bind = super+shift, 3, tag, 3, 0
bind = super+shift, 4, tag, 4, 0
bind = super+shift, 5, tag, 5, 0
bind = super+shift, 6, tag, 6, 0
bind = super+shift, 7, tag, 7, 0
bind = super+shift, 8, tag, 8, 0
bind = super+shift, 9, tag, 9, 0

# Super + 0 views all tags at once
bind = super, 0, view, 0, 0

# Super + scroll moves up/down tags
axisbind = super, up, viewtoleft_have_client
axisbind = super, down, viewtoright_have_client

# 3-Finger swipe to change workspaces on trackpad
gesturebind = none, up, 3, viewtoleft_have_client
gesturebind = none, down, 3, viewtoright_have_client

# === Window Operations ===
# Close window
bind = super, backspace, killclient,

# Resize window
bind = super+alt, up, resizewin, +0, -50
bind = super+alt, down, resizewin, +0, +50
bind = super+alt, left, resizewin, -50, +0
bind = super+alt, right, resizewin, +50, +0

# Move around and resize windows with super + mouse
mousebind = super, btn_left, moveresize, curmove
mousebind = super, btn_right, moveresize, curresize

# === Keyboard Settings ===
repeat_rate = 25
repeat_delay = 600
numlockon = 0
xkb_rules_layout = us

# Trackpad
disable_trackpad = 0
tap_to_click = 1
tap_and_drag = 1
drag_lock = 1
trackpad_natural_scrolling = 0
disable_while_typing = 1
left_handed = 0
middle_button_emulation = 0
swipe_min_threshold = 1
