# === Blur & Shadows ===
blur = 1
shadows = 0

# === Window Visuals ===
borderpx = 4
border_radius = 8
no_radius_when_single = 0
focused_opacity = 1.0
unfocused_opacity = 0.96

# Window Separation
gappih = 4
gappiv = 4
gappoh = 8
gappov = 8

# === Animations ===
animations = 1

# Animation for switching tags
tag_animation_direction = 0
