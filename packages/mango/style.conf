animation_curve_open = 0.46, 1.0, 0.29, 1

# Animation for closing windows
animation_type_close = fade
fadeout_begin_opacity = 1.0
animation_duration_close = 200
animation_curve_close = 0.46, 1.0, 0.29, 1
