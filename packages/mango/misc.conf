# === Monitor settings ===
# Monitor for my desktop PC
monitorrule = model:^24E4$, width:1920, height:1080, refresh:120, vrr:1, scale:1
# Laptop monitor
monitorrule = name:^eDP-1$, width:2560, height:1600, refresh:60, scale:2

# === Misc ===
no_border_when_single = 0
axis_bind_apply_timeout = 100
focus_on_activate = 1
idleinhibit_ignore_visible = 0
sloppyfocus = 1
warpcursor = 1
focus_cross_monitor = 0
focus_cross_tag = 0
enable_floating_snap = 0
snap_distance = 30
cursor_size = 72
drag_tile_to_tile = 1

